<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Africa Nephrology Symposium</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      background: #0b3d5c;
      color: white;
      padding: 20px;
      margin: 0;
    }

    #africaMap {
      width: 100%;
      height: 600px;
      display: block;
      margin: auto;
    }

    section {
      background: white;
      margin: 30px;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>African Nephrology Transplant Symposium</h1>

<!-- MAP -->
<object type="image/svg+xml" data="africa.svg" id="africaMap"></object>

<!-- KENYA -->
<section id="KE">
  <h2>Kenya</h2>
  <p>Dr. Example – Nephrologist</p>
</section>

<!-- ETHIOPIA -->
<section id="ET">
  <h2>Ethiopia</h2>
  <p>Dr. Example – Nephrologist</p>
</section>

<!-- CONGO (DRC) -->
<section id="CD">
  <h2>Democratic Republic of the Congo</h2>
  <p>Dr. Example – Nephrologist</p>
</section>

<!-- CONGO (Republic) -->
<section id="CG">
  <h2>Republic of the Congo</h2>
  <p>Dr. Example – Nephrologist</p>
</section>

<script>
document.getElementById("africaMap").addEventListener("load", function () {
  const svg = this.contentDocument;

  const countries = ["KE", "ET", "CD", "CG"];

  countries.forEach(id => {
    const country = svg.getElementById(id);

    if(country){
      country.style.cursor = "pointer";

      country.addEventListener("click", function () {
        document.getElementById(id).scrollIntoView({
          behavior: "smooth"
        });
      });

      // hover effect
      country.addEventListener("mouseover", function () {
        country.style.fill = "orange";
      });

      country.addEventListener("mouseout", function () {
        country.style.fill = "#f2f2f2";
      });
    }
  });
});
</script>

</body>
</html>
