<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a0933, #2a0f4a, #3a1464);
    color: white;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  nav a {
    color: white;
    text-decoration: none;
    margin-left: 24px;
    font-weight: 500;
    transition: 0.3s ease;
  }

  nav a:hover {
    color: #c084fc;
  }

  .hero {
    text-align: center;
    padding: 70px 20px 30px;
  }

  .hero h1 {
    font-size: 3rem;
    margin-bottom: 15px;
  }

  .hero p {
    max-width: 850px;
    margin: auto;
    color: #d6c7f7;
    font-size: 1.1rem;
  }

  .main-section {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 28px;
    padding: 20px 40px 60px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card h2 {
    margin-bottom: 15px;
    font-size: 1.6rem;
  }

  .subtext {
    color: #cbb6ff;
    margin-bottom: 15px;
  }

  .map-wrapper {
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    padding: 10px;
  }

  svg {
    width: 100%;
  }

  .africa-outline {
    fill: rgba(255,255,255,0.05);
    stroke: rgba(255,255,255,0.2);
  }

  .country {
    fill: #7c3aed;
    stroke: #e9d5ff;
    stroke-width: 1.5;
    cursor: pointer;
    transition: 0.25s ease;
  }

  .country:hover {
    fill: #a855f7;
  }

  .country.active {
    fill: #facc15;
    stroke: white;
  }

  .country-label {
    fill: white;
    font-size: 12px;
    pointer-events: none;
  }

  .selected-country {
    font-size: 1.4rem;
    color: #facc15;
    margin-bottom: 12px;
  }

  .default-text {
    color: #d6c7f7;
  }

  .member-list li {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #c084fc;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .member-name {
    font-weight: bold;
  }

  .member-role {
    color: #d6c7f7;
    font-size: 0.95rem;
  }

  footer {
    text-align: center;
    padding: 25px;
    color: #cbb6ff;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  @media (max-width: 900px) {
    .main-section {
      grid-template-columns: 1fr;
      padding: 20px;
    }

    header {
      flex-direction: column;
      gap: 10px;
    }
  }
</style>
