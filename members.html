<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Members | Nephrica Consortium</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background-color: #f4f1f7;
  color: #4b2e83;
}

header {
  border-bottom: 1px solid #dfd3ee;
  padding: 24px 0;
}

nav {
  display: flex;
  justify-content: center;
  gap: 40px;
}

nav a {
  text-decoration: none;
  color: #4b2e83;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.main-section {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
}

.map-wrapper {
  display: flex;
  justify-content: center;
}

#africaMap {
  width: 100%;
  height: 600px;
}

/* MEMBER STYLES */
.member-list {
  list-style: none;
}

.member-card {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
  background: #f7f3fb;
  padding: 12px;
}

.member-photo {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #6a42b8;
}

.member-name {
  font-weight: bold;
  display: block;
}

.member-role {
  font-size: 0.9rem;
  color: #555;
}

.selected-country {
  font-size: 1.5rem;
  margin-bottom: 15px;
  text-align: center;
}

@media (max-width: 900px) {
  .main-section {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
<nav>
  <a href="./index.html">Home</a>
  <a href="./about.html">About</a>
  <a href="./members.html">Members</a>
  <a href="./projects.html">Projects</a>
</nav>
</header>

<section class="hero">
<h1>Nephrica Consortium Members Across Africa</h1>
<p>Click Ethiopia, Kenya, or Congo on the map.</p>
</section>

<section class="main-section">

<div class="card">
<h2>Africa Map</h2>

<div class="map-wrapper">
<object id="africaMap" data="./africa.svg" type="image/svg+xml"></object>
</div>
</div>

<div class="card">
<h2>Members</h2>

<div id="memberContent">
<div class="selected-country">Select a country</div>
</div>

</div>

</section>

<script>
const membersData = {
  ET: {
    name: "Ethiopia",
    members: [
      {
        name: "Yewondwossen Tadesse Mengistu, MD",
        role: "Yewondwossen Tadesse Mengistu, MD is a Consultant Nephrologist and Associate Professor of Internal Medicine at Addis Ababa University. With over 25 years of experience, his work spans clinical care, medical education, and physician training, and he has mentored many nephrologists across Ethiopia and Africa.

He played a key role in establishing Ethiopia’s first maintenance hemodialysis unit in 2001, helping expand dialysis services nationwide. Dr. Mengistu has authored over 40 peer-reviewed publications, presented widely, and held leadership roles in major national and international nephrology organizations..",
        image: "./images/mengistu.jpg"
      }
    ]
  },

  KE: {
    name: "Kenya",
    members: [
      {
        name: "Dr. Khalida B. Soki",
        role: "Dr. Khalida B. Soki is a board-certified Consultant Internist and Transplant Nephrologist currently practicing at Kidney Care Consultants at The Nairobi Hospital. She completed her transplant fellowship in November 2025 and serves as Medical Director of Figocare Plus dialysis units across Kenya.

She is actively involved in advancing nephrology across the continent, serving as Deputy Secretary-General of the African Association of Nephrology and as an executive member of Women in Nephrology Africa. She previously served as Treasurer of the Kenya Renal Association and has played a key role in developing national kidney transplantation guidelines and promoting best practices in renal care. She also serves as Deputy Chair of the Transplantation Committee following her return to Kenya.

Dr. Soki is a strong advocate for kidney health, education, and equitable access to care. Her research contributions and presentations at international conferences reflect her commitment to improving patient outcomes and advancing nephrology in Africa. Her work is driven by a passion for community engagement, education, and the continuous improvement of kidney care both in Kenya and beyond.",
        image: "./images/default.jpg"
      }
    ]
  },

  CD: {
    name: "Congo",
    members: [
      {
        name: "Dr. Yannick Nlandu Mayamba",
        role: "Consultant nephrologist and internist based at Kinshasa University Hospital, where he serves as Head of the Hemodialysis Unit. He is actively involved in clinical care, medical education, and nephrology training, with experience spanning dialysis, critical care nephrology, and international collaborations. His work is supported by advanced training and participation in global nephrology initiatives and congresses.",
        image: "./images/default.jpg"
      }
    ]
  }
};

function renderMembers(code) {
  const container = document.getElementById("memberContent");
  const country = membersData[code];

  let html = `<div class="selected-country">${country.name}</div>`;
  html += `<ul class="member-list">`;

  country.members.forEach(m => {
    html += `
      <li class="member-card">
        <img src="${m.image}" class="member-photo"/>
        <div>
          <span class="member-name">${m.name}</span>
          <span class="member-role">${m.role}</span>
        </div>
      </li>
    `;
  });

  html += `</ul>`;
  container.innerHTML = html;
}

document.getElementById("africaMap").addEventListener("load", function () {
  const svg = this.contentDocument;

  const allCodes = ["ET","KE","CD"];
  const baseColor = "#d9d1e8";

  allCodes.forEach(code => {
    const el = svg.getElementById(code);
    if (!el) return;

    el.style.fill = baseColor;
    el.style.stroke = "#fff";
    el.style.cursor = "pointer";

    el.addEventListener("mouseenter", () => {
      if (!el.dataset.active) el.style.fill = "#6a42b8";
    });

    el.addEventListener("mouseleave", () => {
      if (!el.dataset.active) el.style.fill = baseColor;
    });

    el.addEventListener("click", () => {
      allCodes.forEach(c => {
        const other = svg.getElementById(c);
        if (other) {
          other.dataset.active = "";
          other.style.fill = baseColor;
        }
      });

      el.dataset.active = "true";
      el.style.fill = "#d24ca3";

      renderMembers(code);
    });
  });
});
</script>

</body>
</html>
