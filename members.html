<script>
  const membersData = {
    ET: {
      name: "Ethiopia",
      members: [
        {
          name: "Yewondwossen Tadesse Mengistu, MD",
          role: "Consultant Nephrologist and Associate Professor of Internal Medicine at Addis Ababa University. With over 25 years of experience, he has led nephrology training, established Ethiopia’s first maintenance hemodialysis unit (2001), and contributed over 40 publications. He has held leadership roles in the Ethiopian Medical Association, Ministry of Health, ISN, AFRAN, and the Declaration of Istanbul Custodian Group."
        }
      ]
    },
    KE: {
      name: "Kenya",
      members: [
        {
          name: "Dr. Khalida B. Soki MD FISN",
          role: "Nephrica Consortium member from Kenya."
        }
      ]
    },
    CD: {  // Democratic Republic of Congo
      name: "Congo",
      members: [
        {
          name: "Dr. Nlandu Mayamba N. Yannick",
          role: "Nephrica Consortium member from Congo."
        }
      ]
    }
  };

  function renderMembers(code) {
    const memberContent = document.getElementById("memberContent");
    const country = membersData[code];

    if (!country) return;

    let html = `<div class="selected-country">${country.name}</div>`;
    html += `<ul class="member-list">`;

    country.members.forEach(member => {
      html += `
        <li>
          <span class="member-name">${member.name}</span>
          <span class="member-role">${member.role}</span>
        </li>
      `;
    });

    html += `</ul>`;
    memberContent.innerHTML = html;
  }

  document.getElementById("africaMap").addEventListener("load", function () {
    const svgDoc = this.contentDocument;
    if (!svgDoc) return;

    const clickable = ["ET", "KE", "CD"]; // Ethiopia, Kenya, Congo (DRC)

    // Dim ALL countries first
    const allCodes = [
      "DZ","EG","LY","MA","TN","NG","GH","SN","ML","CI","BF","NE",
      "CM","TD","CF","GA","GQ","UG","TZ","RW","BI","SO","ER","DJ",
      "ZA","BW","ZW","ZM","NA","MZ","MW","LS","SZ","MG","CD","KE","ET"
    ];

    allCodes.forEach(code => {
      const el = svgDoc.getElementById(code);
      if (el) {
        el.style.fill = "#d9d1e8";
        el.style.stroke = "#ffffff";
        el.style.strokeWidth = "1";
        el.style.cursor = "default";
      }
    });

    // Activate only selected countries
    clickable.forEach(code => {
      const el = svgDoc.getElementById(code);

      if (!el) {
        console.log("Missing:", code);
        return;
      }

      el.style.fill = "#6a42b8";
      el.style.stroke = "#ffffff";
      el.style.strokeWidth = "1.5";
      el.style.cursor = "pointer";

      el.addEventListener("mouseenter", () => {
        if (!el.dataset.active) {
          el.style.fill = "#8a63d2";
        }
      });

      el.addEventListener("mouseleave", () => {
        if (!el.dataset.active) {
          el.style.fill = "#6a42b8";
        }
      });

      el.addEventListener("click", () => {
        // Reset all
        clickable.forEach(c => {
          const other = svgDoc.getElementById(c);
          if (other) {
            other.dataset.active = "";
            other.style.fill = "#6a42b8";
          }
        });

        // Highlight selected
        el.dataset.active = "true";
        el.style.fill = "#d24ca3";

        renderMembers(code);
      });
    });
  });
</script>
